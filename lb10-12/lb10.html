        let name = "Жук Настя";
        let n = 64; // номер варианта
        let i = 1;

            document.write(i +". " + name + "<br>");
            i++;
        } while (i <= n + 5);

    <script>
        // Исходный массив
        let arr = [1, 2, 3, 4, 5, 6];
        
        // Создаем копию исходного массива для отображения
        let initialArr = [...arr];
        
        // 1. Поиск суммы четных элементов
        let sumEven = 0;
        for(let num of arr) { 
            if(num % 2 === 0) sumEven += num; 
        }
        
        // 2. Перестановка первого и последнего элемента
        let lastIdx = arr.length - 1;
        let temp = arr[0];
        arr[0] = arr[lastIdx];
        arr[lastIdx] = temp;

        // Вывод результатов
        document.write("<p>Сумма четных элементов: " + sumEven + "<br>");
        document.write("Исходный массив: " + initialArr.join(", ") + "<br>");
        document.write("Измененный массив: " + arr.join(", ") + "</p>");
    </script>
